version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: congestion-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - congestion-net

  api:
    build: ./platform-api
    container_name: congestion-api
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SEOUL_API_KEY: ${SEOUL_API_KEY}
      BUS_API_KEY: ${BUS_API_KEY}
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    networks:
      - congestion-net

volumes:
  mysql-data:

networks:
  congestion-net:
