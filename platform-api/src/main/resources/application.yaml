spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/congestion_db?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:congestion_user}
    password: ${SPRING_DATASOURCE_PASSWORD:congestion1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
          format_sql: true
          dialect: org.hibernate.dialect.MySQL8Dialect

server:
  port: 8080

seoul:
  api:
    key: ${SEOUL_API_KEY}
    url: http://openapi.seoul.go.kr:8088

bus:
  api:
    key: ${BUS_API_KEY}
    url: http://t-data.seoul.go.kr/apig/apiman-gateway/tapi/v2xBusStationCrowdedInformation/1.0
